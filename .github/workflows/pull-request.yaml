name: PR 🚀

on:
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node from mise.toml
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Enable corepack
        run: |
          corepack enable
          corepack install

      - name: Restore yarn install cache (node_modules + .yarn/cache + install-state)
        id: yarn-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .yarn/cache
            .yarn/install-state.gz
          key: yarn-${{ runner.os }}-${{ hashFiles('mise.toml') }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-${{ hashFiles('mise.toml') }}-

      - name: Install deps
        run: yarn install --immutable

      - name: Tests
        run: yarn coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Code styles
        run: yarn lint

      - name: Formatting
        run: yarn prettier --check .

      - name: Typecheck
        run: yarn typecheck
